# ── Local dev stack ───────────────────────────────────────────────────────────
# Bring up with: make dev
# Run unit tests: make docker-test
# Run e2e tests:  make e2e

services:

  # ── Certovus broker ─────────────────────────────────────────────────────────
  broker:
    build: .
    volumes:
      - broker-data:/data
    environment:
      CERTOVUS_ENV: dev
      BROKER_DB_PATH: /data/certovus.db
      ACME_ACCOUNT_KEY_PATH: /data/acme_account.key
      PEBBLE_URL: https://pebble:14000/dir
      # pebble uses a self-signed CA; trust it for outbound ACME requests
      REQUESTS_CA_BUNDLE: /app/docker/pebble-ca.pem
      LOG_LEVEL: DEBUG
    depends_on:
      - pebble
    command: ["gunicorn", "--workers", "4", "--bind", "0.0.0.0:8080", "broker.wsgi:app"]

  # ── nginx (dev reverse proxy) ───────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8000:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - broker

  # ── pebble (ACME test server) ────────────────────────────────────────────────
  # PEBBLE_VA_ALWAYS_VALID=1: skip real DNS lookups — TXT records don't need to
  # exist.  NoopDNS in e2e tests satisfies the DNSProvider interface without
  # calling any external service.
  pebble:
    image: ghcr.io/letsencrypt/pebble:latest
    command: ["-config", "/test/config/pebble-config.json"]
    environment:
      PEBBLE_VA_ALWAYS_VALID: "1"
    ports:
      - "14000:14000"   # ACME directory
      - "15000:15000"   # management API

volumes:
  broker-data:
