# Production nginx config for Certovus.
#
# Assumptions:
#   - Certbot manages the broker's own TLS cert via HTTP-01 (not DNS-01).
#   - Gunicorn listens on 127.0.0.1:8080.
#   - CERTOVUS_DOMAIN is substituted by the deploy script (envsubst).
#     Replace ${CERTOVUS_DOMAIN} with your actual FQDN if deploying manually.
#
# Only /sign and /health are exposed. All other paths return 404.

# Limit request body to 64 KB — CSRs are small.
client_max_body_size 64k;

# ── HTTP: redirect to HTTPS + serve ACME challenge ────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name ${CERTOVUS_DOMAIN};

    # Let certbot answer HTTP-01 challenges for the broker's own cert.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name ${CERTOVUS_DOMAIN};

    # Cert managed by certbot (HTTP-01, renewed by cron).
    ssl_certificate     /etc/letsencrypt/live/${CERTOVUS_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${CERTOVUS_DOMAIN}/privkey.pem;

    # TLS hardening
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # OCSP stapling
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout    5s;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options    nosniff                                always;
    add_header X-Frame-Options           DENY                                   always;

    # Pass real client IP to Flask (used for audit log source_ip).
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;
    proxy_set_header Host               $host;

    # Device CSR signing endpoint.
    location = /sign {
        proxy_pass         http://127.0.0.1:8080;
        proxy_read_timeout 120s;   # ACME + DNS propagation can take a while
    }

    # Health check (used by monitoring / load balancer).
    location = /health {
        proxy_pass         http://127.0.0.1:8080;
        proxy_read_timeout 5s;
    }

    # Block all other paths.
    location / {
        return 404;
    }
}
