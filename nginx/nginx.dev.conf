# Development nginx config for Certovus.
#
# No TLS — devices talk plain HTTP to nginx which proxies to the broker
# container.  Used inside docker-compose where the broker service is
# reachable at http://broker:8080.
#
# To add nginx to the dev stack, mount this file and expose port 80:
#
#   nginx:
#     image: nginx:1.27-alpine
#     ports: ["8000:80"]
#     volumes:
#       - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
#     depends_on: [broker]

client_max_body_size 64k;

server {
    listen 80;
    server_name _;

    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto http;
    proxy_set_header Host              $host;

    location = /sign {
        proxy_pass         http://broker:8080;
        proxy_read_timeout 120s;
    }

    location = /health {
        proxy_pass         http://broker:8080;
        proxy_read_timeout 5s;
    }

    location / {
        return 404;
    }
}
